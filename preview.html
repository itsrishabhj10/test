<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IPL Stone Break Lucky Draw</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
      url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      color:white;
      overflow-x:hidden;
    }

    .container{
      max-width:1300px;
      margin:auto;
      padding:30px 20px 60px;
    }

    .title{
      text-align:center;
      margin-bottom:10px;
      font-size:52px;
      font-weight:700;
      background:linear-gradient(to right,#ffcc00,#ff9800);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      text-align:center;
      color:#ddd;
      margin-bottom:40px;
      font-size:18px;
    }

    .top-section{
      display:grid;
      grid-template-columns:1fr 320px;
      gap:25px;
      margin-bottom:35px;
    }

    .input-card,
    .settings-card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      border-radius:24px;
      padding:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .card-title{
      font-size:24px;
      margin-bottom:18px;
      color:#ffcc00;
      font-weight:600;
    }

    textarea{
      width:100%;
      height:180px;
      border:none;
      outline:none;
      border-radius:18px;
      padding:18px;
      resize:none;
      font-size:16px;
      background:rgba(255,255,255,0.95);
    }

    .settings-card label{
      display:block;
      margin-top:18px;
      margin-bottom:8px;
      font-weight:500;
      color:#eee;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      outline:none;
      font-size:16px;
    }

    .button-group{
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:45px;
    }

    button{
      border:none;
      padding:16px 34px;
      border-radius:18px;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .generate-btn{
      background:linear-gradient(135deg,#ff9800,#ff5722);
      color:white;
      box-shadow:0 10px 25px rgba(255,152,0,0.35);
    }

    .generate-btn:hover{
      transform:translateY(-3px) scale(1.03);
    }

    .reset-btn{
      background:linear-gradient(135deg,#ff1744,#d50000);
      color:white;
    }

    .teams{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .team-box{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:25px;
      padding:25px;
      min-height:520px;
      position:relative;
      overflow:hidden;
    }

    .team-box::before{
      content:"";
      position:absolute;
      width:250px;
      height:250px;
      background:rgba(255,255,255,0.05);
      border-radius:50%;
      top:-100px;
      right:-100px;
    }

    .team-title{
      font-size:34px;
      margin-bottom:25px;
      text-align:center;
      font-weight:700;
    }

    .team-a{
      color:#00e5ff;
    }

    .team-b{
      color:#ff4da6;
    }

    .players-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:18px;
    }

    .stone{
      height:110px;
      border-radius:20px;
      background:linear-gradient(145deg,#3d3d3d,#1f1f1f);
      border:2px solid rgba(255,255,255,0.08);
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.3s;
      overflow:hidden;
      box-shadow:
      inset 0 2px 8px rgba(255,255,255,0.08),
      0 8px 18px rgba(0,0,0,0.4);
    }

    .stone:hover{
      transform:translateY(-4px) scale(1.03);
    }

    .stone::before{
      content:"🪨";
      position:absolute;
      font-size:42px;
      transition:0.5s;
    }

    .stone.cracked{
      background:linear-gradient(135deg,#ff9800,#ff5722);
      animation:breakStone 0.5s ease;
    }

    .stone.cracked::before{
      opacity:0;
      transform:scale(2);
    }

    .player-name{
      opacity:0;
      transform:scale(0.5);
      transition:0.5s;
      text-align:center;
      padding:10px;
      font-size:18px;
      font-weight:600;
    }

    .stone.cracked .player-name{
      opacity:1;
      transform:scale(1);
    }

    @keyframes breakStone{
      0%{
        transform:scale(1) rotate(0deg);
      }
      25%{
        transform:scale(1.08) rotate(-3deg);
      }
      50%{
        transform:scale(0.95) rotate(3deg);
      }
      100%{
        transform:scale(1);
      }
    }

    .footer{
      text-align:center;
      margin-top:45px;
      color:#bbb;
    }

    @media(max-width:950px){

      .top-section{
        grid-template-columns:1fr;
      }

      .teams{
        grid-template-columns:1fr;
      }

      .title{
        font-size:38px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">🏏 IPL Stone Break Lucky Draw</div>

    <div class="subtitle">
      Click the stones to reveal players randomly divided into Team A & Team B
    </div>

    <div class="top-section">

      <div class="input-card">

        <div class="card-title">Enter Player Names</div>

        <textarea id="playersInput" placeholder="Example:
Virat
Rohit
Dhoni
Gill
Hardik
SKY
Rahul
Pant"></textarea>

      </div>

      <div class="settings-card">

        <div class="card-title">Team Settings</div>

        <label>Players in Team A</label>
        <input type="number" id="teamACount" value="5" min="1">

        <label>Players in Team B</label>
        <input type="number" id="teamBCount" value="5" min="1">

      </div>

    </div>

    <div class="button-group">

      <button class="generate-btn" onclick="generateTeams()">
        🎲 Generate Lucky Draw
      </button>

      <button class="reset-btn" onclick="resetAll()">
        🔄 Reset
      </button>

    </div>

    <div class="teams">

      <div class="team-box">

        <div class="team-title team-a">🔥 Team A</div>

        <div class="players-grid" id="teamA"></div>

      </div>

      <div class="team-box">

        <div class="team-title team-b">⚡ Team B</div>

        <div class="players-grid" id="teamB"></div>

      </div>

    </div>

    <div class="footer">
      IPL Premium Lucky Draw UI ✨
    </div>

  </div>

<script>

  function shuffle(array){

    for(let i = array.length - 1; i > 0; i--){

      let j = Math.floor(Math.random() * (i + 1));

      [array[i], array[j]] = [array[j], array[i]];

    }

    return array;
  }

  function createStone(player){

    const stone = document.createElement("div");

    stone.classList.add("stone");

    stone.innerHTML = `
      <div class="player-name">${player}</div>
    `;

    stone.addEventListener("click", () => {

      stone.classList.add("cracked");

    });

    return stone;
  }

  function generateTeams(){

    const input = document.getElementById("playersInput").value;

    let players = input
      .split("\n")
      .map(p => p.trim())
      .filter(p => p !== "");

    const teamACount = parseInt(document.getElementById("teamACount").value);

    const teamBCount = parseInt(document.getElementById("teamBCount").value);

    if(players.length === 0){

      alert("Please enter player names");

      return;
    }

    if(teamACount + teamBCount > players.length){

      alert("Total players less than team count");

      return;
    }

    shuffle(players);

    const teamAPlayers = players.slice(0, teamACount);

    const teamBPlayers = players.slice(teamACount, teamACount + teamBCount);

    const teamA = document.getElementById("teamA");

    const teamB = document.getElementById("teamB");

    teamA.innerHTML = "";
    teamB.innerHTML = "";

    teamAPlayers.forEach(player => {

      teamA.appendChild(createStone(player));

    });

    teamBPlayers.forEach(player => {

      teamB.appendChild(createStone(player));

    });

  }

  function resetAll(){

    document.getElementById("playersInput").value = "";

    document.getElementById("teamA").innerHTML = "";

    document.getElementById("teamB").innerHTML = "";

  }

</script>

</body>
</html>
